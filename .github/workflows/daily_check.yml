name: daily_check

on:
  # 発火は外部スケジューラ(GAS時間トリガー)から workflow_dispatch で行う
  # GitHub Actions の schedule は遅延が大きいため使用しない
  workflow_dispatch:

permissions:
  contents: write  # screenshots/ を自動コミットするため

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build HTML & screenshot (all regions)
        env:
          SPREADSHEET_ID_KANTO:  ${{ secrets.SPREADSHEET_ID_KANTO }}
          SPREADSHEET_ID_KANSAI: ${{ secrets.SPREADSHEET_ID_KANSAI }}
          SPREADSHEET_ID_KYUSHU: ${{ secrets.SPREADSHEET_ID_KYUSHU }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "from main import run_all; run_all('build_render')"

      - name: Commit screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update screenshots [skip ci]"
            git push
          fi

      - name: Wait for raw URL to propagate
        run: sleep 15

      - name: Send to LINE (all regions)
        env:
          LINE_CHANNEL_TOKEN:    ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_TARGET_ID_KANTO:  ${{ secrets.LINE_TARGET_ID_KANTO }}
          LINE_TARGET_ID_KANSAI: ${{ secrets.LINE_TARGET_ID_KANSAI }}
          LINE_TARGET_ID_KYUSHU: ${{ secrets.LINE_TARGET_ID_KYUSHU }}
          IMAGE_PUBLIC_URL_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/screenshots
        run: |
          python -c "from main import run_all; run_all('send')"
